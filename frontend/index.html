<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3f7d58" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Zeladoria Urbana Inteligente — Registre ocorrências na sua cidade" />
  <title>Zeladoria Urbana</title>
  <link rel="icon" type="image/png" sizes="32x32" href="img/logo_32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="img/logo_64.png" />
  <link rel="apple-touch-icon" href="img/logo_192.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="toast-container" aria-live="polite"></div>

  <main id="app" role="main">
    <div class="loading-msg" style="min-height:100dvh;flex-direction:column;gap:16px">
      <img src="img/logo_transparent.png" alt="Zeladoria" style="width:64px;height:64px;object-fit:contain;opacity:.6" />
      <span class="spinner spinner-g"></span>
    </div>
  </main>

  <nav id="bottom-nav" style="display:none" aria-label="Navegação principal">
    <button class="nav-item" data-rota="#mapa" onclick="navegar('#mapa')">
      <span class="nav-icon">🗺️</span>
      <span>Mapa</span>
    </button>
    <button class="nav-item" data-rota="#historico" onclick="navegar('#historico')">
      <span class="nav-icon">📋</span>
      <span>Histórico</span>
    </button>
    <button class="nav-item nav-fab" data-rota="#registrar" onclick="navegar('#registrar')">
      <img src="img/logo_transparent.png" alt="Registrar" class="nav-fab-logo" />
    </button>
    <button class="nav-item" data-rota="#dashboard" onclick="navegar('#dashboard')">
      <span class="nav-icon">📊</span>
      <span>Dados</span>
    </button>
    <button class="nav-item" onclick="Auth.logout()">
      <span class="nav-icon">👤</span>
      <span>Sair</span>
    </button>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
